<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNTH MODULAR — Desktop</title>
  <meta name="theme-color" content="#0a0a0f">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Top Bar -->
  <header class="top-bar">
    <a href="index.html" class="home-link">&larr; SYNTH MODULAR</a>
    <div class="preset-bar">
      <label>PRESET</label>
      <select id="presetSelect"></select>
      <button id="savePresetBtn" class="sm-btn">SAVE</button>
    </div>
    <div class="master-section">
      <label>MASTER</label>
      <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.7" class="knob-range">
      <span id="masterVolumeVal" class="val-display">0.70</span>
    </div>
  </header>

  <!-- Visualizer -->
  <div class="viz-container">
    <canvas id="vizCanvas"></canvas>
  </div>

  <!-- Main Synth Panel -->
  <main class="synth-panel">

    <!-- OSC 1 -->
    <section class="module osc-module">
      <h3 class="module-title"><span class="led-dot"></span> OSC 1</h3>
      <div class="control-row">
        <div class="control">
          <label>WAVE</label>
          <select id="oscType" data-param="oscType">
            <option value="sawtooth">SAW</option>
            <option value="square">SQUARE</option>
            <option value="sine">SINE</option>
            <option value="triangle">TRI</option>
          </select>
        </div>
        <div class="control">
          <label>OCTAVE</label>
          <select id="octave" data-param="octave">
            <option value="-2">-2</option>
            <option value="-1">-1</option>
            <option value="0" selected>0</option>
            <option value="1">+1</option>
            <option value="2">+2</option>
          </select>
        </div>
      </div>
    </section>

    <!-- OSC 2 -->
    <section class="module osc-module">
      <h3 class="module-title"><span class="led-dot cyan"></span> OSC 2</h3>
      <div class="control-row">
        <div class="control">
          <label>WAVE</label>
          <select id="osc2Type" data-param="osc2Type">
            <option value="sawtooth">SAW</option>
            <option value="square" selected>SQUARE</option>
            <option value="sine">SINE</option>
            <option value="triangle">TRI</option>
          </select>
        </div>
        <div class="control">
          <label>OCTAVE</label>
          <select id="osc2Octave" data-param="osc2Octave">
            <option value="-2">-2</option>
            <option value="-1">-1</option>
            <option value="0" selected>0</option>
            <option value="1">+1</option>
            <option value="2">+2</option>
          </select>
        </div>
      </div>
      <div class="control-row">
        <div class="control">
          <label>DETUNE</label>
          <input type="range" id="osc2Detune" data-param="osc2Detune" min="0" max="50" step="1" value="7" class="knob-range">
          <span class="val-display" data-for="osc2Detune">7</span>
        </div>
        <div class="control">
          <label>MIX</label>
          <input type="range" id="osc2Mix" data-param="osc2Mix" min="0" max="1" step="0.01" value="0.5" class="knob-range">
          <span class="val-display" data-for="osc2Mix">0.50</span>
        </div>
      </div>
      <div class="control-row">
        <div class="control">
          <label>NOISE</label>
          <input type="range" id="noiseLevel" data-param="noiseLevel" min="0" max="1" step="0.01" value="0" class="knob-range">
          <span class="val-display" data-for="noiseLevel">0.00</span>
        </div>
      </div>
    </section>

    <!-- FILTER -->
    <section class="module filter-module">
      <h3 class="module-title"><span class="led-dot orange"></span> FILTER</h3>
      <div class="control-row">
        <div class="control">
          <label>TYPE</label>
          <select id="filterType" data-param="filterType">
            <option value="lowpass">LPF</option>
            <option value="highpass">HPF</option>
            <option value="bandpass">BPF</option>
            <option value="notch">NOTCH</option>
          </select>
        </div>
      </div>
      <div class="control-row">
        <div class="control">
          <label>CUTOFF</label>
          <input type="range" id="filterCutoff" data-param="filterCutoff" min="20" max="20000" step="1" value="5000" class="knob-range accent">
          <span class="val-display" data-for="filterCutoff">5000</span>
        </div>
        <div class="control">
          <label>RESO</label>
          <input type="range" id="filterResonance" data-param="filterResonance" min="0" max="20" step="0.1" value="1" class="knob-range accent">
          <span class="val-display" data-for="filterResonance">1.0</span>
        </div>
      </div>
      <div class="control-row">
        <div class="control">
          <label>ENV AMT</label>
          <input type="range" id="filterEnvAmount" data-param="filterEnvAmount" min="0" max="1" step="0.01" value="0" class="knob-range accent">
          <span class="val-display" data-for="filterEnvAmount">0.00</span>
        </div>
      </div>
    </section>

    <!-- ENVELOPE -->
    <section class="module env-module">
      <h3 class="module-title"><span class="led-dot purple"></span> ENVELOPE</h3>
      <div class="control-row">
        <div class="control">
          <label>ATK</label>
          <input type="range" id="attack" data-param="attack" min="0.001" max="5" step="0.001" value="0.01" class="knob-range purple">
          <span class="val-display" data-for="attack">0.01</span>
        </div>
        <div class="control">
          <label>DEC</label>
          <input type="range" id="decay" data-param="decay" min="0.001" max="5" step="0.001" value="0.3" class="knob-range purple">
          <span class="val-display" data-for="decay">0.30</span>
        </div>
      </div>
      <div class="control-row">
        <div class="control">
          <label>SUS</label>
          <input type="range" id="sustain" data-param="sustain" min="0" max="1" step="0.01" value="0.7" class="knob-range purple">
          <span class="val-display" data-for="sustain">0.70</span>
        </div>
        <div class="control">
          <label>REL</label>
          <input type="range" id="release" data-param="release" min="0.01" max="10" step="0.01" value="0.5" class="knob-range purple">
          <span class="val-display" data-for="release">0.50</span>
        </div>
      </div>
      <canvas id="envCanvas" class="env-display" width="180" height="60"></canvas>
    </section>

    <!-- LFO -->
    <section class="module lfo-module">
      <h3 class="module-title"><span class="led-dot cyan"></span> LFO</h3>
      <div class="control-row">
        <div class="control">
          <label>SHAPE</label>
          <select id="lfoShape" data-param="lfoShape">
            <option value="sine">SINE</option>
            <option value="square">SQUARE</option>
            <option value="sawtooth">SAW</option>
            <option value="triangle">TRI</option>
          </select>
        </div>
        <div class="control">
          <label>TARGET</label>
          <select id="lfoTarget" data-param="lfoTarget">
            <option value="filter">FILTER</option>
            <option value="pitch">PITCH</option>
            <option value="amplitude">AMP</option>
          </select>
        </div>
      </div>
      <div class="control-row">
        <div class="control">
          <label>RATE</label>
          <input type="range" id="lfoRate" data-param="lfoRate" min="0.01" max="30" step="0.01" value="4" class="knob-range cyan">
          <span class="val-display" data-for="lfoRate">4.00</span>
        </div>
        <div class="control">
          <label>DEPTH</label>
          <input type="range" id="lfoDepth" data-param="lfoDepth" min="0" max="1" step="0.01" value="0" class="knob-range cyan">
          <span class="val-display" data-for="lfoDepth">0.00</span>
        </div>
      </div>
    </section>

    <!-- EFFECTS -->
    <section class="module fx-module wide">
      <h3 class="module-title"><span class="led-dot orange"></span> EFFECTS</h3>

      <div class="fx-sub">
        <h4>DELAY</h4>
        <div class="control-row">
          <div class="control">
            <label>TIME</label>
            <input type="range" id="delayTime" data-param="delayTime" min="0.01" max="1.5" step="0.01" value="0.3" class="knob-range">
            <span class="val-display" data-for="delayTime">0.30</span>
          </div>
          <div class="control">
            <label>FDBK</label>
            <input type="range" id="delayFeedback" data-param="delayFeedback" min="0" max="0.9" step="0.01" value="0.3" class="knob-range">
            <span class="val-display" data-for="delayFeedback">0.30</span>
          </div>
          <div class="control">
            <label>MIX</label>
            <input type="range" id="delayMix" data-param="delayMix" min="0" max="1" step="0.01" value="0.2" class="knob-range">
            <span class="val-display" data-for="delayMix">0.20</span>
          </div>
        </div>
      </div>

      <div class="fx-sub">
        <h4>REVERB</h4>
        <div class="control-row">
          <div class="control">
            <label>DECAY</label>
            <input type="range" id="reverbDecay" data-param="reverbDecay" min="0.1" max="8" step="0.1" value="2.5" class="knob-range">
            <span class="val-display" data-for="reverbDecay">2.5</span>
          </div>
          <div class="control">
            <label>MIX</label>
            <input type="range" id="reverbMix" data-param="reverbMix" min="0" max="1" step="0.01" value="0.2" class="knob-range">
            <span class="val-display" data-for="reverbMix">0.20</span>
          </div>
        </div>
      </div>

      <div class="fx-sub">
        <h4>DISTORTION</h4>
        <div class="control-row">
          <div class="control">
            <label>DRIVE</label>
            <input type="range" id="distortionAmount" data-param="distortionAmount" min="0" max="1" step="0.01" value="0" class="knob-range">
            <span class="val-display" data-for="distortionAmount">0.00</span>
          </div>
        </div>
      </div>

      <div class="fx-sub">
        <h4>CHORUS</h4>
        <div class="control-row">
          <div class="control">
            <label>RATE</label>
            <input type="range" id="chorusRate" data-param="chorusRate" min="0.1" max="10" step="0.1" value="1.5" class="knob-range">
            <span class="val-display" data-for="chorusRate">1.5</span>
          </div>
          <div class="control">
            <label>DEPTH</label>
            <input type="range" id="chorusDepth" data-param="chorusDepth" min="0" max="0.01" step="0.0001" value="0.002" class="knob-range">
            <span class="val-display" data-for="chorusDepth">0.002</span>
          </div>
          <div class="control">
            <label>MIX</label>
            <input type="range" id="chorusMix" data-param="chorusMix" min="0" max="1" step="0.01" value="0" class="knob-range">
            <span class="val-display" data-for="chorusMix">0.00</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Sequencer -->
  <section class="sequencer-panel">
    <div class="seq-header">
      <h3 class="module-title"><span class="led-dot"></span> SEQUENCER</h3>
      <div class="seq-controls">
        <button id="seqPlayBtn" class="seq-btn play-btn">&#9654; PLAY</button>
        <button id="seqStopBtn" class="seq-btn">&#9632; STOP</button>
        <label>BPM</label>
        <input type="number" id="seqBPM" value="120" min="30" max="300" class="bpm-input">
        <label>PATTERN</label>
        <select id="seqPresetSelect"></select>
        <button id="seqRandomBtn" class="sm-btn">RANDOM</button>
        <label>SCALE</label>
        <select id="seqScale">
          <option value="minor">Minor</option>
          <option value="major">Major</option>
          <option value="pentatonic">Pentatonic</option>
          <option value="minorPentatonic">Minor Pent</option>
          <option value="blues">Blues</option>
          <option value="dorian">Dorian</option>
          <option value="phrygian">Phrygian</option>
          <option value="lydian">Lydian</option>
          <option value="arabic">Arabic</option>
        </select>
      </div>
    </div>
    <div class="seq-grid" id="seqGrid"></div>
    <div class="seq-notes" id="seqNotes"></div>
  </section>

  <!-- Keyboard -->
  <section class="keyboard-panel">
    <div class="keyboard" id="keyboard"></div>
  </section>

  <script src="synth-engine.js"></script>
  <script src="presets.js"></script>
  <script>
    // ============================================================
    // DESKTOP APP CONTROLLER
    // ============================================================

    const synth = new SynthEngine();
    const seq = new Sequencer(synth);
    let vizAnimId = null;

    // --- Init ---
    async function initApp() {
      await synth.init();
      buildKeyboard();
      buildSequencer();
      populatePresets();
      bindControls();
      startVisualization();
      drawEnvelope();
    }

    // --- Presets ---
    function populatePresets() {
      const sel = document.getElementById('presetSelect');
      for (const name of Object.keys(PRESETS)) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      }
      // Load user presets from localStorage
      const userPresets = JSON.parse(localStorage.getItem('synthModular_userPresets') || '{}');
      for (const name of Object.keys(userPresets)) {
        const opt = document.createElement('option');
        opt.value = 'user:' + name;
        opt.textContent = '* ' + name;
        sel.appendChild(opt);
      }
      sel.addEventListener('change', () => loadPreset(sel.value));

      // Sequencer presets
      const seqSel = document.getElementById('seqPresetSelect');
      for (const name of Object.keys(SEQ_PRESETS)) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        seqSel.appendChild(opt);
      }
      seqSel.addEventListener('change', () => {
        const preset = SEQ_PRESETS[seqSel.value];
        if (preset) {
          seq.loadPattern(preset.pattern);
          document.getElementById('seqBPM').value = preset.bpm;
          seq.setBPM(preset.bpm);
          updateSequencerUI();
        }
      });
    }

    function loadPreset(name) {
      let preset;
      if (name.startsWith('user:')) {
        const userPresets = JSON.parse(localStorage.getItem('synthModular_userPresets') || '{}');
        preset = userPresets[name.slice(5)];
      } else {
        preset = PRESETS[name];
      }
      if (!preset) return;
      for (const [key, val] of Object.entries(preset)) {
        synth.setParam(key, val);
        const el = document.querySelector(`[data-param="${key}"]`);
        if (el) {
          el.value = val;
          const display = document.querySelector(`[data-for="${key}"]`);
          if (display) display.textContent = formatVal(key, val);
        }
      }
      // Update master vol separately
      document.getElementById('masterVolume').value = preset.masterVolume || 0.7;
      document.getElementById('masterVolumeVal').textContent = (preset.masterVolume || 0.7).toFixed(2);
      drawEnvelope();
    }

    document.getElementById('savePresetBtn').addEventListener('click', () => {
      const name = prompt('Preset name:');
      if (!name) return;
      const userPresets = JSON.parse(localStorage.getItem('synthModular_userPresets') || '{}');
      userPresets[name] = { ...synth.params };
      localStorage.setItem('synthModular_userPresets', JSON.stringify(userPresets));
      const sel = document.getElementById('presetSelect');
      const opt = document.createElement('option');
      opt.value = 'user:' + name;
      opt.textContent = '* ' + name;
      sel.appendChild(opt);
      sel.value = 'user:' + name;
    });

    // --- Control binding ---
    function bindControls() {
      document.querySelectorAll('[data-param]').forEach(el => {
        const param = el.dataset.param;
        const handler = () => {
          let val = el.value;
          if (el.type === 'range' || el.type === 'number') val = parseFloat(val);
          if (['octave', 'osc2Octave'].includes(param)) val = parseInt(val);
          synth.setParam(param, val);
          const display = document.querySelector(`[data-for="${param}"]`);
          if (display) display.textContent = formatVal(param, val);
          if (['attack', 'decay', 'sustain', 'release'].includes(param)) drawEnvelope();
        };
        el.addEventListener('input', handler);
        el.addEventListener('change', handler);
      });

      // Master volume
      const mv = document.getElementById('masterVolume');
      mv.addEventListener('input', () => {
        synth.setParam('masterVolume', parseFloat(mv.value));
        document.getElementById('masterVolumeVal').textContent = parseFloat(mv.value).toFixed(2);
      });

      // Sequencer controls
      document.getElementById('seqPlayBtn').addEventListener('click', async () => {
        await synth.init();
        synth.resume();
        seq.start();
        document.getElementById('seqPlayBtn').classList.add('active');
      });
      document.getElementById('seqStopBtn').addEventListener('click', () => {
        seq.stop();
        document.getElementById('seqPlayBtn').classList.remove('active');
      });
      document.getElementById('seqBPM').addEventListener('input', (e) => {
        seq.setBPM(parseInt(e.target.value));
      });
      document.getElementById('seqRandomBtn').addEventListener('click', () => {
        const scale = document.getElementById('seqScale').value;
        seq.randomize(scale);
        updateSequencerUI();
      });
    }

    function formatVal(param, val) {
      if (typeof val === 'number') {
        if (param === 'filterCutoff') return Math.round(val) + ' Hz';
        if (val >= 100) return Math.round(val).toString();
        if (val >= 10) return val.toFixed(1);
        return val.toFixed(val < 0.01 ? 4 : 2);
      }
      return val;
    }

    // --- Keyboard ---
    function buildKeyboard() {
      const kb = document.getElementById('keyboard');
      const startNote = 48; // C3
      const numOctaves = 3;
      const whiteNotes = [0, 2, 4, 5, 7, 9, 11];
      const blackNotes = [1, 3, -1, 6, 8, 10, -1];

      for (let oct = 0; oct < numOctaves; oct++) {
        const octBase = startNote + oct * 12;
        for (let i = 0; i < 7; i++) {
          const note = octBase + whiteNotes[i];
          const key = document.createElement('div');
          key.className = 'key white';
          key.dataset.note = note;
          key.innerHTML = `<span class="key-label">${noteToName(note)}</span>`;
          kb.appendChild(key);

          if (blackNotes[i] >= 0) {
            const bNote = octBase + blackNotes[i];
            const bKey = document.createElement('div');
            bKey.className = 'key black';
            bKey.dataset.note = bNote;
            kb.appendChild(bKey);
          }
        }
      }

      // Mouse/touch events
      let mouseDown = false;
      kb.addEventListener('mousedown', e => {
        mouseDown = true;
        const key = e.target.closest('.key');
        if (key) playKey(key);
      });
      kb.addEventListener('mouseover', e => {
        if (!mouseDown) return;
        const key = e.target.closest('.key');
        if (key) playKey(key);
      });
      kb.addEventListener('mouseup', () => { mouseDown = false; synth.allNotesOff(); releaseAllKeys(); });
      kb.addEventListener('mouseleave', () => { if (mouseDown) { mouseDown = false; synth.allNotesOff(); releaseAllKeys(); }});

      kb.addEventListener('touchstart', e => { e.preventDefault(); handleTouch(e); }, { passive: false });
      kb.addEventListener('touchmove', e => { e.preventDefault(); handleTouch(e); }, { passive: false });
      kb.addEventListener('touchend', e => { e.preventDefault(); synth.allNotesOff(); releaseAllKeys(); }, { passive: false });

      // Computer keyboard
      const keyMap = {
        'a': 48, 'w': 49, 's': 50, 'e': 51, 'd': 52, 'f': 53,
        't': 54, 'g': 55, 'y': 56, 'h': 57, 'u': 58, 'j': 59,
        'k': 60, 'o': 61, 'l': 62, 'p': 63, ';': 64
      };
      const keysDown = new Set();
      document.addEventListener('keydown', async e => {
        if (e.repeat || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        const note = keyMap[e.key.toLowerCase()];
        if (note !== undefined && !keysDown.has(e.key)) {
          keysDown.add(e.key);
          await synth.init();
          synth.resume();
          synth.noteOn(note);
          const keyEl = kb.querySelector(`[data-note="${note}"]`);
          if (keyEl) keyEl.classList.add('active');
        }
      });
      document.addEventListener('keyup', e => {
        const note = keyMap[e.key.toLowerCase()];
        if (note !== undefined) {
          keysDown.delete(e.key);
          synth.noteOff(note);
          const keyEl = kb.querySelector(`[data-note="${note}"]`);
          if (keyEl) keyEl.classList.remove('active');
        }
      });
    }

    function playKey(key) {
      synth.init().then(() => {
        synth.resume();
        const note = parseInt(key.dataset.note);
        synth.noteOn(note);
        key.classList.add('active');
      });
    }

    function releaseAllKeys() {
      document.querySelectorAll('.key.active').forEach(k => k.classList.remove('active'));
    }

    function handleTouch(e) {
      synth.allNotesOff();
      releaseAllKeys();
      for (const touch of e.touches) {
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.closest('.key')) {
          playKey(el.closest('.key'));
        }
      }
    }

    // --- Sequencer UI ---
    function buildSequencer() {
      const grid = document.getElementById('seqGrid');
      const notes = document.getElementById('seqNotes');
      grid.innerHTML = '';
      notes.innerHTML = '';

      for (let i = 0; i < 16; i++) {
        const step = document.createElement('div');
        step.className = 'seq-step' + (seq.pattern[i].active ? ' active' : '');
        step.dataset.step = i;
        step.addEventListener('click', () => {
          const isActive = seq.toggleStep(i);
          step.classList.toggle('active', isActive);
        });
        grid.appendChild(step);

        const noteInput = document.createElement('select');
        noteInput.className = 'seq-note-select';
        noteInput.dataset.step = i;
        for (let n = 24; n <= 84; n++) {
          const opt = document.createElement('option');
          opt.value = n;
          opt.textContent = noteToName(n);
          if (n === seq.pattern[i].note) opt.selected = true;
          noteInput.appendChild(opt);
        }
        noteInput.addEventListener('change', () => {
          seq.setStepNote(i, parseInt(noteInput.value));
        });
        notes.appendChild(noteInput);
      }

      seq.onStep = (stepIdx) => {
        document.querySelectorAll('.seq-step').forEach((s, i) => {
          s.classList.toggle('current', i === stepIdx);
        });
      };
    }

    function updateSequencerUI() {
      const steps = document.querySelectorAll('.seq-step');
      const noteSelects = document.querySelectorAll('.seq-note-select');
      for (let i = 0; i < 16; i++) {
        if (steps[i]) steps[i].classList.toggle('active', seq.pattern[i].active);
        if (noteSelects[i]) noteSelects[i].value = seq.pattern[i].note;
      }
    }

    // --- Envelope Display ---
    function drawEnvelope() {
      const canvas = document.getElementById('envCanvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      const a = synth.params.attack;
      const d = synth.params.decay;
      const s = synth.params.sustain;
      const r = synth.params.release;
      const total = a + d + 0.3 + r;

      const ax = (a / total) * w;
      const dx = ax + (d / total) * w;
      const sx = dx + (0.3 / total) * w;
      const rx = w;

      ctx.beginPath();
      ctx.moveTo(0, h);
      ctx.lineTo(ax, 4);
      ctx.lineTo(dx, h - s * (h - 4));
      ctx.lineTo(sx, h - s * (h - 4));
      ctx.lineTo(rx, h);
      ctx.strokeStyle = '#b388ff';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = 'rgba(179, 136, 255, 0.1)';
      ctx.fill();
    }

    // --- Visualization ---
    function startVisualization() {
      const canvas = document.getElementById('vizCanvas');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width = canvas.parentElement.clientWidth * window.devicePixelRatio;
        canvas.height = canvas.parentElement.clientHeight * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      }
      resize();
      window.addEventListener('resize', resize);

      const particles = [];
      for (let i = 0; i < 40; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          r: Math.random() * 2 + 1,
          hue: Math.random() * 60 + 10
        });
      }

      function draw() {
        const w = canvas.width / window.devicePixelRatio;
        const h = canvas.height / window.devicePixelRatio;
        ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
        ctx.fillRect(0, 0, w, h);

        const freqData = synth.getFrequencyData();
        const waveData = synth.getWaveformData();

        if (freqData.length > 0) {
          // Frequency bars
          const barCount = 64;
          const barW = w / barCount;
          const step = Math.floor(freqData.length / barCount);
          for (let i = 0; i < barCount; i++) {
            const val = freqData[i * step] / 255;
            const barH = val * h * 0.6;
            const hue = 20 + i * 3;
            ctx.fillStyle = `hsla(${hue}, 80%, 55%, ${0.3 + val * 0.5})`;
            ctx.fillRect(i * barW, h - barH, barW - 1, barH);
          }

          // Waveform
          if (waveData.length > 0) {
            ctx.beginPath();
            const sliceW = w / waveData.length;
            for (let i = 0; i < waveData.length; i++) {
              const v = waveData[i] / 128.0;
              const y = (v * h) / 2;
              if (i === 0) ctx.moveTo(0, y);
              else ctx.lineTo(i * sliceW, y);
            }
            ctx.strokeStyle = 'rgba(0, 229, 255, 0.5)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }

          // Particles react to audio
          const bass = freqData.slice(0, 10).reduce((a, b) => a + b, 0) / (10 * 255);
          particles.forEach(p => {
            p.x += p.vx + bass * 2;
            p.y += p.vy;
            if (p.x < 0 || p.x > w) p.vx *= -1;
            if (p.y < 0 || p.y > h) p.vy *= -1;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r + bass * 3, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${p.hue}, 70%, 60%, ${0.2 + bass * 0.5})`;
            ctx.fill();
          });
        }

        vizAnimId = requestAnimationFrame(draw);
      }
      draw();
    }

    // --- Start ---
    document.addEventListener('click', () => { synth.init(); synth.resume(); }, { once: true });
    initApp();
  </script>
</body>
